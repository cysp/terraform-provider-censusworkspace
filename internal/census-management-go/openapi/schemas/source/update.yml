UpdateSourceBody:
  type: object
  properties:
    connection:
      type: object
      properties:
        name:
          type: string
          description: The name assigned to this source.
        label:
          type: string
          description: Deprecated. Use name instead.
          nullable: true
        credentials:
          description: Credentials that should be associated with this source (e.g. hostname, port)
  required:
    - connection
