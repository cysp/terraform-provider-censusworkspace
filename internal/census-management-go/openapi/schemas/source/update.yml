UpdateSourceBody:
  type: object
  properties:
    connection:
      type: object
      properties:
        label:
          type: string
          description: An optional label that can be assigned to the source for better categorization or identification.
          nullable: true
        credentials:
          description: Credentials that should be associated with this source (e.g. hostname, port)
        warehouse_writeback_retention_in_days:
          type: integer
          format: int64
          minimum: 1
          description: Number of days to retain warehouse writeback data. When set, automatically enables sync logs for this source.
  required:
    - connection
