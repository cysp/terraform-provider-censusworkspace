datasetResponse:
  description: A dataset
  content:
    application/json:
      schema:
        type: object
        properties:
          status:
            $ref: ../schemas/response-status.yml#/ResponseStatus
          data:
            $ref: ../schemas/dataset/data.yml#/DatasetData
        required:
          - status
          - data
refreshKeyResponse:
  description: A refresh key
  content:
    application/json:
      schema:
        type: object
        properties:
          refresh_key:
            type: integer
            format: int64
        required:
          - refresh_key
